name: Deploy to Contabo

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.github/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'naghra/qibla'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build
        env:
          VITE_SITE_ORIGIN: https://travelsmarttravelfast.com
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
        run: |
          npm ci
          npm run build

      - name: Deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_SSH_PORT || 22 }}
          source: 'dist/*,server/*'
          target: '/var/www/qibla'
          strip_components: 0

      - name: Configure and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_SSH_PORT || 22 }}
          script: |
            set -e
            mkdir -p /var/www/qibla/dist /var/www/qibla/server

            cat > /var/www/qibla/.env <<EOF
            VITE_SITE_ORIGIN=https://travelsmarttravelfast.com
            VITE_ADMIN_PASSWORD=${{ secrets.VITE_ADMIN_PASSWORD }}
            PORT=3000
            HOST=127.0.0.1
            EOF
            chmod 600 /var/www/qibla/.env

            cat > /etc/systemd/system/qibla.service <<'UNIT'
            [Unit]
            Description=Travel Smart Travel Fast (Qibla) Node server
            After=network.target
            [Service]
            Type=simple
            WorkingDirectory=/var/www/qibla
            EnvironmentFile=/var/www/qibla/.env
            ExecStart=/usr/bin/node server/index.js
            Restart=on-failure
            RestartSec=5
            [Install]
            WantedBy=multi-user.target
            UNIT

            if ! grep -q travelsmarttravelfast.com /etc/nginx/sites-enabled/* 2>/dev/null; then
              cat > /etc/nginx/sites-available/travelsmarttravelfast.com <<'NGINX'
            upstream qibla_app {
                server 127.0.0.1:3000;
            }
            server {
                listen 80;
                listen [::]:80;
                server_name travelsmarttravelfast.com www.travelsmarttravelfast.com;
                location / {
                    proxy_pass http://qibla_app;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGINX
              ln -sf /etc/nginx/sites-available/travelsmarttravelfast.com /etc/nginx/sites-enabled/
            fi

            systemctl daemon-reload
            systemctl enable qibla
            systemctl restart qibla
            nginx -t && systemctl reload nginx
            echo "Deployed OK"
