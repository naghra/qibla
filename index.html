<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="تقديم بطاقة الوصول الرقمية التايلاندية TDAC عبر الإنترنت — معالجة سريعة ودعم خبير على مدار الساعة" />
    <title>بطاقة الوصول الرقمية التايلاندية TDAC — سفر ذكي سفر سريع</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        safelist: [
          { pattern: /^(sm|md|lg|xl):/ },
          'translate-x-0', 'translate-x-full', '-translate-x-full',
          'admin-cards-wrap', 'admin-table-wrap', 'admin-mobile-bar', 'admin-desktop-bar',
          'admin-bottom-nav', 'admin-desktop-sidebar', 'admin-mobile-drawer', 'admin-mobile-overlay',
        ],
        theme: {
          extend: {
            fontFamily: {
              sans: ['"IBM Plex Sans Arabic"', '"IBM Plex Sans"', 'sans-serif'],
              quicksand: ['Quicksand', '"IBM Plex Sans"', 'sans-serif'],
            },
            borderRadius: { '4xl': '2rem' },
          },
        },
      };
    </script>
    <style>
      html { scroll-behavior: smooth; }
      body {
        font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', sans-serif;
        color: #3c4043;
        background: #fff;
      }
      html[lang="en"] body {
        font-family: Quicksand, 'IBM Plex Sans', sans-serif;
      }
      .text-pretty { text-wrap: pretty; }
      .hero-overlay { background-color: rgba(22, 36, 86, 0.7); }
      .hero-fallback { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #1d4ed8 100%); }
      .spin-slow {
        animation: spin 3s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .fade-in { animation: fadeIn 0.4s ease-out forwards; }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Admin panel — mobile layout (works even if Tailwind CDN misses classes) */
      [data-admin-layout] {
        width: 100%;
        max-width: 100vw;
        overflow-x: hidden;
      }
      [data-admin-layout] .admin-main {
        width: 100%;
        max-width: 100%;
      }
      [data-admin-layout] .admin-cards-wrap,
      [data-admin-layout] .admin-bottom-nav {
        display: block;
      }
      [data-admin-layout] .admin-cards-toolbar,
      [data-admin-layout] .admin-mobile-bar {
        display: flex;
      }
      [data-admin-layout] .admin-table-wrap,
      [data-admin-layout] .admin-desktop-bar,
      [data-admin-layout] .admin-desktop-sidebar {
        display: none;
      }
      @media (min-width: 768px) {
        [data-admin-layout] .admin-cards-wrap,
        [data-admin-layout] .admin-cards-toolbar,
        [data-admin-layout] .admin-mobile-bar,
        [data-admin-layout] .admin-bottom-nav,
        [data-admin-layout] .admin-mobile-overlay,
        [data-admin-layout] .admin-mobile-drawer {
          display: none !important;
        }
        [data-admin-layout] .admin-table-wrap,
        [data-admin-layout] .admin-desktop-bar,
        [data-admin-layout] .admin-desktop-sidebar {
          display: flex;
        }
        [data-admin-layout] .admin-table-wrap {
          display: block;
        }
        [data-admin-layout] .admin-main {
          padding-bottom: 0 !important;
        }
      }
      @media print {
        [data-admin-layout] .admin-mobile-bar,
        [data-admin-layout] .admin-bottom-nav,
        [data-admin-layout] .admin-desktop-bar,
        [data-admin-layout] .admin-desktop-sidebar,
        [data-admin-layout] .admin-mobile-drawer,
        [data-admin-layout] .admin-mobile-overlay {
          display: none !important;
        }
      }
    </style>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
